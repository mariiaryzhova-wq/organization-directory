services:
  mysql:
    image: mysql:8.4
    container_name: community_catalog-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: community_catalog
      MYSQL_USER: admin
      MYSQL_PASSWORD: apppassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
  app:
    build: .
    container_name: community_catalog-app
    ports:
      - "3000:3000"
volumes:
  mysql_data: