name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      PORT: 3000
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASSWORD: secret
      DB_NAME: catalog_db
      DB_PORT: 3306
      DATABASE_URL: mysql://root:secret@127.0.0.1:3306/catalog_db
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate build and Node startup
        run: npm run validate:ci